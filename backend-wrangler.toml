name = "roteamento-coletas-backend"
main = "src/index.js"
compatibility_date = "2024-01-01"

[env.production]
name = "roteamento-coletas-backend-prod"
route = "api.samuelchaves.com/*"

[env.staging]
name = "roteamento-coletas-backend-staging"
route = "staging-api.samuelchaves.com/*"

[[d1_databases]]
binding = "DB"
database_name = "roteamento-coletas-db"
database_id = "your-database-id-here"

[triggers]
crons = ["0 0 * * *"] # Daily at midnight for cleanup tasks
