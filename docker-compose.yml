version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: roteamento-postgres
    environment:
      POSTGRES_DB: roteamento_coletas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - roteamento-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: roteamento-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@roteamento.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8081:80"
    depends_on:
      - postgres
    networks:
      - roteamento-network

volumes:
  postgres_data:

networks:
  roteamento-network:
    driver: bridge 